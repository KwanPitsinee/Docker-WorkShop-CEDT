name: CI

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kwanpitsinee
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t kwanpitsinee/workshop-app:latest .

      - name: Tag image with commit SHA
        run: docker tag kwanpitsinee/workshop-app:latest kwanpitsinee/workshop-app:${{ github.sha }}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: kwanpitsinee/workshop-app:latest
          severity: CRITICAL
          exit-code: '1'

      - name: Push latest tag
        run: docker push kwanpitsinee/workshop-app:latest

      - name: Push sha tag
        run: docker push kwanpitsinee/workshop-app:${{ github.sha }}